name: mindkeep

# Run from infra/:  docker compose --env-file .env up --build
# (copy .env.example -> .env first)

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mindkeep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-mindkeep}
    ports:
      - "5432:5432"
    volumes:
      - ../private/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindkeep}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    command: ["python", "-m", "app.jobs.worker"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
