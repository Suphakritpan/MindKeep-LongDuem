# Alembic config. Run from backend/:  alembic upgrade head
# The DB URL is NOT set here — env.py reads it from app settings (DATABASE_URL),
# so migrations use the same connection config as the app.

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
path_separator = os
# version filenames: 0001_xxx, 0002_xxx ...
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
